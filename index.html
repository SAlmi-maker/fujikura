<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fujikura - Machine Status</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            min-height: 100vh;
        }

        header {
            background: #fff;
            padding: 0 40px;
            height: 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { display: flex; align-items: center; gap: 12px; }
        .logo svg { height: 32px; width: auto; }

        .sync-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background: #e8f5e9;
            color: #2E7D32;
            margin-left: 12px;
        }

        .sync-badge .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #4CAF50;
            animation: blink 2s infinite;
        }

        .nav-buttons { display: flex; gap: 6px; }

        .nav-btn {
            padding: 9px 22px;
            border: none;
            background: transparent;
            color: #666;
            font-size: 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .nav-btn.active { background: #1a1a2e; color: #fff; }
        .nav-btn:hover:not(.active) { background: #e8e8e8; }

        .page {
            display: none;
            padding: 30px 40px;
            max-width: 1100px;
            margin: 0 auto;
            animation: fadeIn 0.3s ease;
        }

        .page.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            margin-bottom: 24px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title svg { width: 20px; height: 20px; color: #e94560; }

        .machine-info-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            padding: 20px 0;
        }

        .info-item {
            text-align: center;
        }

        .info-item .info-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .info-item .info-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1a1a2e;
        }

        .circles-container {
            display: flex;
            justify-content: center;
            gap: 32px;
            flex-wrap: wrap;
            padding: 20px 0;
        }

        .circle-btn {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #fff;
            transition: all 0.25s ease;
        }

        .circle-btn:hover { transform: scale(1.06); }
        .circle-btn:active { transform: scale(0.94); }
        .circle-btn svg { width: 40px; height: 40px; margin-bottom: 10px; }

        .circle-btn .label {
            font-size: 0.85rem;
            text-align: center;
            line-height: 1.3;
            letter-spacing: 0.3px;
        }

        .circle-blue { background: #2196F3; box-shadow: 0 6px 20px rgba(33, 150, 243, 0.35); }
        .circle-blue:hover { box-shadow: 0 8px 28px rgba(33, 150, 243, 0.5); }

        .circle-red { background: #e94560; box-shadow: 0 6px 20px rgba(233, 69, 96, 0.35); }
        .circle-red:hover { box-shadow: 0 8px 28px rgba(233, 69, 96, 0.5); }

        .circle-green { background: #4CAF50; box-shadow: 0 6px 20px rgba(76, 175, 80, 0.35); }
        .circle-green:hover { box-shadow: 0 8px 28px rgba(76, 175, 80, 0.5); }

        .circle-yellow { background: #F9A825; box-shadow: 0 6px 20px rgba(249, 168, 37, 0.35); }
        .circle-yellow:hover { box-shadow: 0 8px 28px rgba(249, 168, 37, 0.5); }

        .pulse { animation: pulse 0.5s ease; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.12); }
            100% { transform: scale(1); }
        }

        .last-status {
            text-align: center;
            padding: 10px;
            margin-top: 8px;
        }

        .last-status-text {
            font-size: 0.9rem;
            color: #999;
        }

        .last-status-text strong { color: #1a1a2e; }

        .history-table { width: 100%; border-collapse: collapse; }

        .history-table th,
        .history-table td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.9rem;
        }

        .history-table th {
            font-weight: 700;
            color: #999;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .history-table tr:hover td { background: #fafafa; }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 700;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .badge-technician { background: #fff8e1; color: #F57F17; }
        .badge-maintenance { background: #e3f2fd; color: #1565C0; }
        .badge-working { background: #e8f5e9; color: #2E7D32; }
        .badge-stopping { background: #fde7e7; color: #c62828; }

        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .form-group { flex: 1; min-width: 180px; }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #ddd;
            background: #fafafa;
            color: #1a1a2e;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #e94560;
            background: #fff;
        }

        .form-group textarea { resize: vertical; min-height: 90px; }

        .checklist { margin: 8px 0; }

        .checklist h3 {
            font-size: 0.85rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            margin-top: 8px;
        }

        .check-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .check-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #e94560;
            cursor: pointer;
            flex-shrink: 0;
        }

        .check-item label { cursor: pointer; font-size: 0.92rem; color: #444; }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: #1a1a2e;
            border: none;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 24px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .submit-btn:hover { background: #e94560; transform: translateY(-1px); }

        .empty-msg { text-align: center; color: #bbb; padding: 40px; font-size: 1rem; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1a1a2e;
            color: #fff;
            padding: 14px 30px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
            z-index: 999;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }

        .clear-btn {
            padding: 8px 20px;
            background: transparent;
            border: 1.5px solid #ddd;
            color: #999;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.82rem;
            transition: all 0.2s;
            margin-top: 16px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .clear-btn:hover { border-color: #e94560; color: #e94560; }

        .settings-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 1.5px solid #ddd;
            background: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            transition: all 0.2s;
            margin-left: 8px;
        }

        .settings-btn:hover { border-color: #e94560; color: #e94560; }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: #fff;
            border-radius: 14px;
            padding: 32px;
            width: 90%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: modalIn 0.25s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal h2 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal h2 svg { width: 20px; height: 20px; color: #e94560; }

        .modal .form-group { margin-bottom: 16px; }

        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        .modal-btns button {
            flex: 1;
            padding: 11px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .modal-save { background: #1a1a2e; color: #fff; }
        .modal-save:hover { background: #e94560; }

        .modal-cancel { background: #f0f0f0; color: #555; }
        .modal-cancel:hover { background: #e0e0e0; }

        @media (max-width: 768px) {
            header { padding: 0 16px; flex-direction: column; height: auto; padding: 12px 16px; gap: 8px; }
            .page { padding: 16px; }
            .circles-container { gap: 16px; }
            .circle-btn { width: 140px; height: 140px; }
            .circle-btn svg { width: 32px; height: 32px; }
            .machine-info-bar { gap: 24px; }
            .form-row { flex-direction: column; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <a href="https://www.europe.fujikura.com" target="_blank" rel="noopener" style="display:flex; align-items:center;">
                <img src="https://www.europe.fujikura.com/wp-content/uploads/2024/04/Fujikura-Logo-Colour.svg" alt="Fujikura" style="height:32px; width:auto;">
            </a>
            <span class="sync-badge">
                <span class="dot"></span>
                Manager Sync Ready
            </span>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn active" onclick="showPage('operator', this)">Operator Panel</button>
            <button class="nav-btn" onclick="showPage('maintenance', this)">Maintenance Sheet</button>
            <button class="settings-btn" onclick="openSettings()" title="Machine Settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
        </div>
    </header>

    <!-- OPERATOR PAGE -->
    <div id="operator-page" class="page active">

        <div class="card">
            <div class="card-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                Machine Information
            </div>
            <div class="machine-info-bar">
                <div class="info-item">
                    <div class="info-label">Machine ID</div>
                    <div class="info-value" id="displayMachineId"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">Location</div>
                    <div class="info-value" id="displayLocation"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">Current Time</div>
                    <div class="info-value" id="displayTime" style="font-size:1.1rem;"></div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                Machine Status
            </div>
            <p style="text-align:center; color:#999; margin-bottom:10px; font-size:0.9rem;">Select the current status of this machine</p>
            <div class="circles-container">
                <button class="circle-btn circle-blue" onclick="reportStatus('Needs Maintenance')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                    <span class="label">Needs<br>Maintenance</span>
                </button>
                <button class="circle-btn circle-red" onclick="reportStatus('Stopping')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
                    <span class="label">Machine<br>Stopping</span>
                </button>
                <button class="circle-btn circle-green" onclick="reportStatus('Working Well')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    <span class="label">Working<br>Well</span>
                </button>
                <button class="circle-btn circle-yellow" onclick="reportStatus('Technician Working')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="6" r="3"/></svg>
                    <span class="label">Technician<br>Working</span>
                </button>
            </div>
            <div class="last-status" id="lastStatusBox" style="display:none;">
                <span class="last-status-text">Last reported: <strong id="lastStatusText"></strong></span>
            </div>
        </div>

        <div class="card">
            <div class="card-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                Recent Reports
            </div>
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
            <button class="clear-btn" onclick="clearHistory()">Clear History</button>
        </div>
    </div>

    <!-- MAINTENANCE PAGE -->
    <div id="maintenance-page" class="page">
        <div class="card">
            <div class="card-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                Maintenance Declaration Sheet
            </div>

            <div class="machine-info-bar" style="margin-bottom:20px;">
                <div class="info-item">
                    <div class="info-label">Machine ID</div>
                    <div class="info-value" id="maintDisplayMachine"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">Location</div>
                    <div class="info-value" id="maintDisplayLocation"></div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Technician ID</label>
                    <input type="text" id="techId" placeholder="e.g. TEC-018">
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="maintDate">
                </div>
                <div class="form-group">
                    <label>Shift</label>
                    <select id="maintShift">
                        <option value="Morning">Morning</option>
                        <option value="Afternoon">Afternoon</option>
                        <option value="Night">Night</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Maintenance Type</label>
                    <input type="text" id="maintType" value="Corrective" readonly style="background:#f0f0f0; color:#555; cursor:not-allowed;">
                </div>
            </div>

            <div class="checklist">
                <h3>Pre-Maintenance Checklist</h3>
                <div class="check-item">
                    <input type="checkbox" id="check1">
                    <label for="check1">Machine completely stopped and locked out (LOTO)</label>
                </div>
                <div class="check-item">
                    <input type="checkbox" id="check2">
                    <label for="check2">Area cleaned and secured</label>
                </div>
                <div class="check-item">
                    <input type="checkbox" id="check3">
                    <label for="check3">Spare parts available and verified</label>
                </div>
                <div class="check-item">
                    <input type="checkbox" id="check4">
                    <label for="check4">Required tools prepared</label>
                </div>
                <div class="check-item">
                    <input type="checkbox" id="check5">
                    <label for="check5">Safety PPE worn</label>
                </div>
                <div class="check-item">
                    <input type="checkbox" id="check6">
                    <label for="check6">Operator informed of maintenance start</label>
                </div>
                <div class="check-item">
                    <input type="checkbox" id="check7">
                    <label for="check7">Machine tested after maintenance</label>
                </div>
                <div class="check-item">
                    <input type="checkbox" id="check8">
                    <label for="check8">Operator informed of maintenance completion</label>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Problem Description</label>
                    <textarea id="problemDesc" placeholder="Describe the issue found..."></textarea>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Actions Taken</label>
                    <textarea id="actionsTaken" placeholder="Describe maintenance actions performed..."></textarea>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Parts Replaced</label>
                    <input type="text" id="partsReplaced" placeholder="e.g. Blade, Belt, Sensor">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Machine Status After Maintenance</label>
                    <select id="postStatus">
                        <option value="Operational">Operational</option>
                        <option value="Partial">Partial - Reduced Capacity</option>
                        <option value="Down">Still Down - Needs Follow-up</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Additional Notes</label>
                    <textarea id="addNotes" placeholder="Any other observations..."></textarea>
                </div>
            </div>

            <button class="submit-btn" onclick="submitMaintenance()">Submit Maintenance Report</button>
        </div>
    </div>

    <!-- SETTINGS MODAL -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                Machine Settings
            </h2>
            <div class="form-group">
                <label>Machine ID</label>
                <input type="text" id="settingsMachineId" placeholder="e.g. MCH-042">
            </div>
            <div class="form-group">
                <label>Location</label>
                <input type="text" id="settingsLocation" placeholder="e.g. Building A - Line 3">
            </div>
            <div class="modal-btns">
                <button class="modal-cancel" onclick="closeSettings()">Cancel</button>
                <button class="modal-save" onclick="saveSettings()">Save</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        /* ==============================================================
           CONFIGURATION - Defaults for each machine computer
           Operator can change these from the settings panel.
        ============================================================== */
        var MACHINE_ID = localStorage.getItem('cfg_machineId') || "MCH-042";
        var LOCATION   = localStorage.getItem('cfg_location')   || "Building A - Line 3";

        /* Manager API - set when ready */
        var MANAGER_API_URL = null;
        var SYNC_ENABLED   = false;

        /* ==============================================================
           INIT
        ============================================================== */
        function refreshDisplays() {
            document.getElementById('displayMachineId').textContent = MACHINE_ID;
            document.getElementById('displayLocation').textContent   = LOCATION;
            document.getElementById('maintDisplayMachine').textContent = MACHINE_ID;
            document.getElementById('maintDisplayLocation').textContent = LOCATION;
        }

        refreshDisplays();
        document.getElementById('maintDate').valueAsDate = new Date();
        renderHistory();
        updateClock();
        setInterval(updateClock, 1000);

        function updateClock() {
            document.getElementById('displayTime').textContent = new Date().toLocaleTimeString();
        }

        /* ==============================================================
           SETTINGS
        ============================================================== */
        function openSettings() {
            document.getElementById('settingsMachineId').value = MACHINE_ID;
            document.getElementById('settingsLocation').value = LOCATION;
            document.getElementById('settingsModal').classList.add('open');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('open');
        }

        function saveSettings() {
            var newId = document.getElementById('settingsMachineId').value.trim();
            var newLoc = document.getElementById('settingsLocation').value.trim();

            if (!newId || !newLoc) {
                showToast('Machine ID and Location are required', '#c62828');
                return;
            }

            MACHINE_ID = newId;
            LOCATION = newLoc;
            localStorage.setItem('cfg_machineId', MACHINE_ID);
            localStorage.setItem('cfg_location', LOCATION);

            refreshDisplays();
            renderHistory();
            closeSettings();
            showToast('Machine info updated', '#4CAF50');
        }

        document.getElementById('settingsModal').addEventListener('click', function(e) {
            if (e.target === this) closeSettings();
        });

        /* ==============================================================
           DATA LAYER
        ============================================================== */
        function getReports() {
            var key = 'reports_' + MACHINE_ID;
            return JSON.parse(localStorage.getItem(key) || '[]');
        }

        function saveReport(report) {
            var key = 'reports_' + MACHINE_ID;
            var reports = getReports();
            reports.unshift(report);
            if (reports.length > 100) reports.pop();
            localStorage.setItem(key, JSON.stringify(reports));
            syncToManager('operator-report', report);
        }

        function getMaintenanceReports() {
            var key = 'mreports_' + MACHINE_ID;
            return JSON.parse(localStorage.getItem(key) || '[]');
        }

        function saveMaintenanceReport(report) {
            var key = 'mreports_' + MACHINE_ID;
            var reports = getMaintenanceReports();
            reports.unshift(report);
            localStorage.setItem(key, JSON.stringify(reports));
            syncToManager('maintenance-report', report);
        }

        /* ==============================================================
           MANAGER SYNC
           POSTs JSON to MANAGER_API_URL when enabled:
           { event, timestamp, machineId, location, payload }
        ============================================================== */
        function syncToManager(eventType, payload) {
            if (!SYNC_ENABLED || !MANAGER_API_URL) return;

            var body = {
                event: eventType,
                timestamp: new Date().toISOString(),
                machineId: MACHINE_ID,
                location: LOCATION,
                payload: payload
            };

            fetch(MANAGER_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            })
            .then(function(res) {
                if (!res.ok) console.warn('[Sync] Failed:', res.status);
            })
            .catch(function(err) {
                console.warn('[Sync] Network error:', err.message);
            });
        }

        /* ==============================================================
           NAVIGATION
        ============================================================== */
        function showPage(page, btn) {
            document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
            document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
            document.getElementById(page + '-page').classList.add('active');
            btn.classList.add('active');
        }

        /* ==============================================================
           OPERATOR - just click a circle
        ============================================================== */
        function reportStatus(status) {
            var now = new Date();
            var report = {
                id: Date.now(),
                time: now.toLocaleString(),
                isoTime: now.toISOString(),
                machineId: MACHINE_ID,
                location: LOCATION,
                status: status
            };

            saveReport(report);

            if (status !== 'Working Well' && status !== 'Technician Working') {
                var aKey = 'alerts_' + MACHINE_ID;
                var alerts = JSON.parse(localStorage.getItem(aKey) || '[]');
                alerts.unshift({
                    id: report.id,
                    time: report.time,
                    machineId: MACHINE_ID,
                    location: LOCATION,
                    status: status
                });
                localStorage.setItem(aKey, JSON.stringify(alerts));
                syncToManager('maintenance-alert', alerts[0]);
            }

            renderHistory();

            var btn = event.currentTarget;
            btn.classList.add('pulse');
            setTimeout(function() { btn.classList.remove('pulse'); }, 500);

            document.getElementById('lastStatusBox').style.display = 'block';
            document.getElementById('lastStatusText').textContent = status + ' at ' + report.time;

            showToast(status + ' reported', status === 'Working Well' ? '#2E7D32' : '#1565C0');
        }

        function renderHistory() {
            var reports = getReports();
            var tbody = document.getElementById('historyBody');
            tbody.innerHTML = '';

            reports.slice(0, 20).forEach(function(r) {
                var badgeClass = {
                    'Working Well': 'badge-working',
                    'Needs Maintenance': 'badge-maintenance',
                    'Technician Working': 'badge-technician',
                    'Stopping': 'badge-stopping'
                }[r.status] || '';

                var tr = document.createElement('tr');
                tr.innerHTML =
                    '<td>' + r.time + '</td>' +
                    '<td><span class="status-badge ' + badgeClass + '">' + r.status + '</span></td>';
                tbody.appendChild(tr);
            });
        }

        function clearHistory() {
            var key = 'reports_' + MACHINE_ID;
            localStorage.removeItem(key);
            renderHistory();
            showToast('History cleared', '#999');
        }

        /* ==============================================================
           MAINTENANCE
        ============================================================== */
        function submitMaintenance() {
            var techId = document.getElementById('techId').value.trim();
            var date   = document.getElementById('maintDate').value;

            if (!techId || !date) {
                showToast('Please enter your Technician ID and date', '#c62828');
                return;
            }

            var checks = [];
            for (var i = 1; i <= 8; i++) {
                var cb = document.getElementById('check' + i);
                checks.push({ item: cb.nextElementSibling.textContent, done: cb.checked });
            }

            // Calculate time metrics from operator status history
            var now = new Date();
            var allReports = getReports();
            var issueReport = null;
            var techWorkingReport = null;

            for (var j = 0; j < allReports.length; j++) {
                var r = allReports[j];
                if (!issueReport && (r.status === 'Needs Maintenance' || r.status === 'Stopping')) {
                    issueReport = r;
                }
                if (!techWorkingReport && r.status === 'Technician Working') {
                    techWorkingReport = r;
                }
                if (issueReport && techWorkingReport) break;
            }

            var waitingTimeMin = 0;
            var maintenanceTimeMin = 0;
            var downtimeMin = 0;

            if (issueReport && issueReport.isoTime) {
                var issueTime = new Date(issueReport.isoTime);

                if (techWorkingReport && techWorkingReport.isoTime) {
                    var techTime = new Date(techWorkingReport.isoTime);
                    waitingTimeMin = Math.max(0, Math.round((techTime - issueTime) / 60000));
                    maintenanceTimeMin = Math.max(0, Math.round((now - techTime) / 60000));
                } else {
                    maintenanceTimeMin = Math.max(0, Math.round((now - issueTime) / 60000));
                }

                downtimeMin = waitingTimeMin + maintenanceTimeMin;
            }

            var report = {
                id: Date.now(),
                isoTime: now.toISOString(),
                techId: techId,
                date: date,
                shift: document.getElementById('maintShift').value,
                machineId: MACHINE_ID,
                location: LOCATION,
                type: document.getElementById('maintType').value,
                checklist: checks,
                problem: document.getElementById('problemDesc').value.trim(),
                actions: document.getElementById('actionsTaken').value.trim(),
                parts: document.getElementById('partsReplaced').value.trim(),
                postStatus: document.getElementById('postStatus').value,
                notes: document.getElementById('addNotes').value.trim(),
                waitingTime: waitingTimeMin,
                maintenanceTime: maintenanceTimeMin,
                downtime: downtimeMin
            };

            saveMaintenanceReport(report);

            document.querySelectorAll('#maintenance-page .form-group input:not([readonly]), #maintenance-page .form-group textarea, #maintenance-page .form-group select').forEach(function(el) {
                if (el.type === 'checkbox') el.checked = false;
                else if (el.tagName === 'SELECT') el.selectedIndex = 0;
                else el.value = '';
            });

            var timeMsg = 'Waiting: ' + waitingTimeMin + 'min | Maintenance: ' + maintenanceTimeMin + 'min | Downtime: ' + downtimeMin + 'min';
            showToast(timeMsg, '#4CAF50');
        }

        /* ==============================================================
           TOAST
        ============================================================== */
        function showToast(msg, color) {
            var toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = color || '#1a1a2e';
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 3000);
        }
    </script>

</body>
</html>
